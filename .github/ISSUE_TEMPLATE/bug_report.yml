name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Wiki Generation
        - AI Q&A / Ask
        - Deep Research
        - MCP Server
        - Web UI
        - Authentication
        - Docker / Deployment
        - Other
    validations:
      required: true

  - type: input
    id: llm-provider
    attributes:
      label: LLM Provider
      description: Which provider are you using?
      placeholder: e.g. OpenAI, Anthropic, Ollama, Gemini

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Docker Compose
        - Manual (local dev)
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error messages or logs
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Python/Node versions, etc.
      placeholder: |
        - OS: macOS 15.3
        - Browser: Chrome 130
        - Python: 3.11
        - Node: 20
