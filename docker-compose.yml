services:
  backend:
    image: ghcr.io/arozumenko/wikis/backend:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    image: ghcr.io/arozumenko/wikis/web:latest
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wikis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikis}
      POSTGRES_DB: ${POSTGRES_DB:-wikis_auth}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wikis}"]
      interval: 10s
      timeout: 5s
      retries: 5
